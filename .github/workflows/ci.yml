name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.96.0"
  # Clone sibling repos at the same branch as this PR so cross-repo changes
  # (e.g. RFL-128 contracts/ move) resolve consistently. Falls back to main
  # on direct pushes (github.head_ref is empty) and for repos without the branch.
  REFLECTIVE_SIBLING_REF: ${{ github.head_ref || 'main' }}

jobs:
  ci:
    name: just ci
    runs-on: ubuntu-latest
    # Heaviest fleet member: fresh check ~21m, fresh test ~44m observed
    # (budgets in the root repo's release-train.yaml). rust-cache keeps
    # warm runs far below this; the cap is for cold-cache runs.
    timeout-minutes: 90
    steps:
      # helms lives INSIDE bedrock-platform/ locally, so its own path deps
      # say ../organism while atelier's crates say ../bedrock-platform/
      # organism. Cargo identifies path packages lexically — the two
      # spellings collide unless the checkout mirrors the real tree.
      # Checking out at bedrock-platform/helms makes every relative path
      # resolve to ONE lexical location under $GITHUB_WORKSPACE.
      - uses: actions/checkout@v6
        with:
          path: bedrock-platform/helms
      - name: Checkout Reflective sibling dependencies
        run: bash bedrock-platform/helms/scripts/ci/checkout-reflective-siblings.sh
      # Tauri v2 Linux system deps for the desktop app crate; zsh is the
      # Justfile shell (`set shell`).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev build-essential curl wget file libssl-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bedrock-platform/helms
      - uses: extractions/setup-just@v3
      - run: just ci
        working-directory: bedrock-platform/helms
