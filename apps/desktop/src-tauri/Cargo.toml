[package]
name = "outcome-workbench-desktop"
version = "0.1.0"
edition = "2024"
default-run = "outcome-workbench-desktop"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[features]
default = ["embedded-backend"]
embedded-backend = ["dep:application-kernel", "dep:application-storage", "dep:workbench-backend"]

[dependencies]
organism-intelligence = { git = "https://github.com/Reflective-Lab/organism", rev = "18200b5e7a709e38630c4c7d02ed8bb231511041", features = ["ocr"] }
organism-notes = { git = "https://github.com/Reflective-Lab/organism", rev = "18200b5e7a709e38630c4c7d02ed8bb231511041", features = ["cleanup", "enrichment", "sources-apple-notes", "sources-web"] }
prio-expenses = { path = "../../../crates/prio-expenses" }
workbench-backend = { path = "../../../crates/workbench-backend", optional = true }
application-kernel = { path = "../../../crates/application-kernel", optional = true }
application-storage = { path = "../../../crates/application-storage", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
uuid = { version = "1", features = ["v4", "serde"] }

[[bin]]
name = "outcome-workbench-desktop"
path = "src/main.rs"

[[bin]]
name = "tester"
path = "src/bin/tester.rs"
required-features = ["embedded-backend"]

[workspace]
