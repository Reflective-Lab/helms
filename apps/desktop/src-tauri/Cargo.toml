[package]
name = "prio-crm-desktop"
version = "0.1.0"
edition = "2021"
default-run = "prio-crm-desktop"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }

[[bin]]
name = "prio-crm-desktop"
path = "src/main.rs"

