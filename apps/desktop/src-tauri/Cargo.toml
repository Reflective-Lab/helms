[package]
name = "outcome-workbench-desktop"
version = "0.1.0"
edition = "2024"
default-run = "outcome-workbench-desktop"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
organism-intelligence = { path = "../../../../organism/crates/intelligence", features = ["ocr"] }
organism-notes = { path = "../../../../organism/crates/notes", features = ["cleanup", "enrichment", "sources-apple-notes", "sources-web"] }
prio-expenses = { path = "../../../crates/prio-expenses" }
workbench-backend = { path = "../../../crates/crm-app" }
application-kernel = { path = "../../../crates/crm-kernel" }
application-storage = { path = "../../../crates/crm-storage" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
uuid = { version = "1", features = ["v4", "serde"] }

[[bin]]
name = "outcome-workbench-desktop"
path = "src/main.rs"

[[bin]]
name = "tester"
path = "src/bin/tester.rs"

[workspace]
