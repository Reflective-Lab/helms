[workspace]
resolver = "2"
members = [
    # Application layer.
    "crates/crm-contracts",
    "crates/workbench-backend",
    "crates/application-kernel",
    "crates/application-storage",
    "crates/application-server",

    # Capability and truth crates.
    "crates/capability-core",
    "crates/capability-registry",
    "crates/prio-catalog",
    "crates/prio-identity",
    "crates/prio-parties",
    "crates/prio-conversations",
    "crates/prio-opportunities",
    "crates/prio-tasks",
    "crates/prio-documents",
    "crates/prio-expenses",
    "crates/prio-apple-notes-cli",
    "crates/prio-subscriptions",
    "crates/prio-metering",
    "crates/prio-ledger",
    "crates/prio-entitlements",
    "crates/prio-payments",
    "crates/prio-workflow",
    "crates/prio-approvals",
    "crates/prio-policies",
    "crates/prio-facts",
    "crates/prio-audit",
    "crates/prio-intents",
    "crates/prio-memory",
    "crates/prio-agent-ops",
    "crates/truth-catalog",

    # Application crates.
    "crates/helm-notes",

    # Utility and support crates.
    "crates/seed-gen",

    # CLI examples — demonstrate organism-intelligence capabilities.
    "examples/capture-social",
    "examples/capture-web",
    "examples/extract-ocr",
    "examples/extract-pdf",
    "examples/describe-image",
    "examples/helm-capture",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
license = "MIT"
publish = false

[workspace.dependencies]
anyhow = "1"
async-stream = "0.3"
axiom-truth = { git = "https://github.com/Reflective-Lab/axiom", tag = "v0.6.0" }
axum = "0.8"
chrono = { version = "0.4", features = ["serde"] }
converge-analytics = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-core = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-domain = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-experience = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-kernel = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-knowledge = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-model = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-optimization = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
converge-pack = { git = "https://github.com/Reflective-Lab/converge", tag = "v3.4.0" }
organism-domain = { git = "https://github.com/Reflective-Lab/organism", rev = "18200b5e7a709e38630c4c7d02ed8bb231511041" }
organism-intelligence = { git = "https://github.com/Reflective-Lab/organism", rev = "18200b5e7a709e38630c4c7d02ed8bb231511041" }
organism-notes = { git = "https://github.com/Reflective-Lab/organism", rev = "18200b5e7a709e38630c4c7d02ed8bb231511041" }
organism-pack = { git = "https://github.com/Reflective-Lab/organism", rev = "18200b5e7a709e38630c4c7d02ed8bb231511041" }
organism-runtime = { git = "https://github.com/Reflective-Lab/organism", rev = "18200b5e7a709e38630c4c7d02ed8bb231511041" }
prost = "0.13"
prost-types = "0.13"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
surrealdb = { version = "3.0.4", default-features = false, features = ["protocol-ws", "protocol-http", "kv-mem", "kv-rocksdb"] }
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
tonic = { version = "0.12", features = ["transport"] }
tonic-build = "0.12"
tower-http = { version = "0.6", features = ["cors", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["serde", "v4"] }
proptest = "1"
