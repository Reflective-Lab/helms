[package]
name = "helm-module-contracts"
description = "Shared contracts for Helm modules mounted into Runtime Runway."
version = "0.2.1"
edition = "2024"
license = "MIT"
repository = "https://github.com/Reflective-Lab/helms"
publish = true

[dependencies]
anyhow = "1"
async-trait = "0.1"
axum = "0.8"
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
