version: 1
strategy: "capability-modules"
notes:
  - "The current crm-kernel remains integrated while these boundaries are extracted."
  - "Each module owns gRPC, OpenAPI, and GraphQL naming from day one."
  - "Truths sit above the modules and are exposed separately through prio.truths.v1."
modules:
  - key: catalog
    suite: commercial-core
    crate: prio-catalog
    grpc: { package: prio.catalog.v1, service: CatalogService }
    openapi: { tag: Catalog, base_path: /v1/catalog }
    graphql: { query: CatalogQuery, mutation: CatalogMutation }
  - key: identity
    suite: foundation
    crate: prio-identity
    grpc: { package: prio.identity.v1, service: IdentityService }
    openapi: { tag: Identity, base_path: /v1/identity }
    graphql: { query: IdentityQuery, mutation: IdentityMutation }
